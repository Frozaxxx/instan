<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feed</title>
  <link rel="stylesheet" href="/static/style.css?v=20260310" />
</head>

<body class="app-bg">
  <!-- фон по бокам -->
  <div class="bg-sides"></div>

  <div class="layout">
    <!-- “телефон”/центральная колонка -->
    <div class="phone">

      <!-- topbar -->
      <div class="topbar">
        <button class="brand-btn" id="brandBtn" type="button" aria-label="instan">instan</button>
      </div>

      <!-- лента постов -->
      <div id="feed" class="feed"></div>

      <!-- bottom bar -->
      <div class="bottombar">
        <button class="nav-btn" id="addPostBtn" type="button" aria-label="add post">➕</button>
        <button class="nav-btn" type="button" id="profileBtn">👤</button>
      </div>
    </div>
  </div>

  <!-- затемнение -->
  <div class="overlay" id="overlay"></div>

  <!-- правая панель -->
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <button class="icon-btn" id="closeDrawerBtn" aria-label="close">←</button>
      <div class="drawer-title">Меню</div>
    </div>

    <div class="drawer-body">
      <div class="me-block">
        <div class="avatar big"></div>
        <div>
          <div class="me-name" id="meName">...</div>
          <div class="me-sub" id="meEmail">...</div>
        </div>
      </div>

      <button class="drawer-item" id="openProfileBtn">Профиль</button>
      <button class="drawer-item danger" onclick="app.logout()">Выйти</button>

      <!-- блок профиля (скрыт, открывается кнопкой) -->
      <div class="profile-panel" id="profilePanel">
        <div class="profile-title">Профиль</div>

        <div class="stats">
          <div class="stat">
            <div class="stat-num" id="followersCount">0</div>
            <div class="stat-label">подписчики</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="followingCount">0</div>
            <div class="stat-label">подписки</div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- модалка создания поста -->
  <div class="modal-overlay" id="postModalOverlay"></div>
  <section class="post-modal" id="postModal" aria-hidden="true">
    <div class="drawer-header">
      <div class="drawer-title">Новый пост</div>
      <button class="icon-btn" id="closePostModalBtn" type="button" aria-label="close">✕</button>
    </div>

    <form class="post-form" id="createPostForm">
      <label class="field-label" for="postImage">Фото</label>
      <input id="postImage" name="image" type="file" accept="image/*" required />

      <img class="image-preview" id="postImagePreview" alt="preview" />

      <label class="field-label" for="postCaption">Описание</label>
      <textarea id="postCaption" name="caption" rows="4" maxlength="2200" placeholder="О чем пост?"></textarea>

      <div class="post-form-bottom">
        <div class="form-error" id="postError"></div>
        <button id="submitPostBtn" type="submit" class="post-submit-btn">Опубликовать</button>
      </div>
    </form>
  </section>

  <script src="/static/app.js?v=20260224"></script>
  <script>
    (async () => {
      const me = await app.requireAuth();
      document.getElementById("meName").textContent = me.username;
      document.getElementById("meEmail").textContent = me.email;
      document.getElementById("followersCount").textContent = me.followers_count ?? 0;
      document.getElementById("followingCount").textContent = me.following_count ?? 0;
      app.initFeedUI();
      await app.loadFeed();
    })();
  </script>
</body>
</html>
