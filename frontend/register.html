<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register</title>
  <link rel="stylesheet" href="/static/style.css?v=20260310" />
</head>
<body>
  <div class="center">
    <div class="card">
      <h1>instan</h1>

      <form onsubmit="app.handleRegister(event)">
        <input id="username" placeholder="username" required />
        <input id="email" placeholder="email" type="email" required />
        <input id="full_name" placeholder="full name" required />
        <input id="password" placeholder="password" type="password" required />
        <button type="submit">Register</button>
      </form>

      <a class="small-link" href="http://127.0.0.1:8000/login_page">Уже есть аккаунт? Login</a>
    </div>
  </div>

  <script src="/static/app.js?v=20260224"></script>
</body>
</html>
